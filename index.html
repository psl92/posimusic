<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>步丝丝的歌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            width: 1709px;
            height: 960px;
            background: linear-gradient(180deg, #74b8ff 0%, #ffc8e0 100%);
            overflow: hidden;
            position: relative;
        }
        /* 花瓣装饰 */
        .petal {
            position: absolute;
            color: #ffb8d2;
            font-size: 120px;
            opacity: 0.7;
        }
        .p1 {top: 30px; right: 80px; rotate: 20deg;}
        .p2 {top: 480px; left: 180px; font-size: 80px;}
        .p3 {top: 420px; right: 90px; font-size: 60px;}
        /* 顶部logo */
        .logo {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 46px;
            color: white;
            font-weight: bold;
        }
        /* 顶部搜索栏 */
        .search-box {
            position: absolute;
            top: 40px;
            left: 35%;
            display: flex;
            align-items: center;
        }
        .search-input {
            width: 420px;
            height: 56px;
            border-radius: 99px;
            border: none;
            padding: 0 24px;
            font-size: 20px;
            background: rgba(255,255,255,0.85);
        }
        .login-btn {
            margin-left: 12px;
            height: 56px;
            width: 100px;
            border-radius: 99px;
            border: none;
            background: white;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
        }
        /* 模式按钮 */
        .mode-btn {
            width: 220px;
            height: 80px;
            border-radius: 99px;
            border: none;
            font-size: 32px;
            font-weight: 500;
            position: absolute;
            background: linear-gradient(90deg, #90d0ff, #f8b8e8);
            color: white;
        }
        .music-mode {
            top: 220px;
            left: 200px;
        }
        .video-mode {
            top: 220px;
            right: 200px;
        }
        /* 中间唱片封面 */
        .cover-box {
            width: 320px;
            height: 420px;
            background: #ffd8e4;
            border-radius: 24px;
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(255,120,180,0.3);
        }
        .disc {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7eb8, #ffc060);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .disc-center {
            width: 90px;
            height: 90px;
            background: #ffd8e8;
            border-radius: 50%;
        }
        .song-name {
            font-size: 64px;
            color: white;
            font-weight: bold;
            position: absolute;
        }
        .singer-name {
            margin-top: 20px;
            font-size: 36px;
            color: #222;
        }
        /* 歌词框 */
        .lyric-box {
            width: 820px;
            height: 110px;
            background: rgba(255,255,255,0.75);
            border-radius: 16px;
            position: absolute;
            top: 680px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: space-around;
            font-size: 36px;
            color: #222;
        }
        .split-line {
            width: 2px;
            height: 60px;
            background: #ccc;
        }
        /* 底部播放控制栏 */
        .bottom-bar {
            width: 100%;
            height: 140px;
            background: rgba(255,255,255,0.6);
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
        }
        .time-text {
            font-size: 30px;
            color: #333;
            width: 140px;
        }
        .prev-text {
            font-size: 28px;
            color: #333;
            width: 80px;
        }
        .progress {
            flex: 1;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            position: relative;
        }
        .progress-fill {
            width: 35%;
            height: 100%;
            background: #ff70b0;
            border-radius: 4px;
        }
        .progress-dot {
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            position: absolute;
            left: 35%;
            top: -9px;
            border: 2px solid #ff70b0;
        }
        .next-text {
            font-size: 28px;
            color: #333;
            width: 80px;
            text-align: right;
        }
        /* 基础播放按钮 */
        .base-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 36px;
            cursor: pointer;
        }
        /* 右侧扩展功能按钮（你要的全套） */
        .func-group {
            display: flex;
            gap: 24px;
            margin-left: 30px;
        }
        .func-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .func-icon {
            font-size: 32px;
            color: #333;
        }
        .func-text {
            font-size: 16px;
            color: #444;
        }
    </style>
</head>
<body>
    <!-- 花瓣装饰 -->
    <div class="petal p1">❀</div>
    <div class="petal p2">❀</div>
    <div class="petal p3">❀</div>

    <!-- 顶部logo -->
    <div class="logo">步丝丝的歌</div>

    <!-- 顶部搜索登录 -->
    <div class="search-box">
        <input class="search-input" placeholder="搜索歌曲、歌手、专辑">
        <button class="login-btn">登录</button>
    </div>

    <!-- 模式切换按钮 -->
    <button class="mode-btn music-mode">音乐模式</button>
    <button class="mode-btn video-mode">视频模式</button>

    <!-- 中间唱片封面 -->
    <div class="cover-box">
        <div class="disc">
            <div class="disc-center"></div>
            <div class="song-name">不负流年</div>
        </div>
        <div class="singer-name">步丝丝</div>
    </div>

    <!-- 歌词栏 -->
    <div class="lyric-box">
        <span>不怕夜更迭</span>
        <div class="split-line"></div>
        <span>在悲伤的时候</span>
    </div>

    <!-- 底部总控制栏（包含你需要的全部功能按钮） -->
    <div class="bottom-bar">
        <div class="time-text">01:28 / 03:46</div>
        <button class="base-btn">≫</button>
        <span class="prev-text">上首</span>
        <!-- 进度条 -->
        <div class="progress">
            <div class="progress-fill"></div>
            <div class="progress-dot"></div>
        </div>
        <span class="next-text">下一首</span>
        <!-- 基础播放按键 -->
        <button class="base-btn">◀◀</button>
        <button class="base-btn">▶</button>
        <button class="base-btn">▶▶</button>

        <!-- 你要求的全套功能按钮：循环、音量、高清、音效、伴奏、歌词、播放列表 -->
        <div class="func-group">
            <div class="func-btn">
                <div class="func-icon">🔁</div>
                <div class="func-text">循环</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">🔊</div>
                <div class="func-text">音量</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">📺</div>
                <div class="func-text">高清</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">🎛️</div>
                <div class="func-text">音效</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">🎤</div>
                <div class="func-text">伴奏</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">📝</div>
                <div class="func-text">歌词</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">📃</div>
                <div class="func-text">播放列表</div>
            </div>
        </div>
    </div>
</body>
</html>
