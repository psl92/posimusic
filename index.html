<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波斯斯K歌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }
        /* 登录弹窗 */
        .login-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-card {
            width: 380px;
            background: #181818;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
        }
        .login-card h2 {
            color: #ff3366;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .login-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .login-btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .guest { background: #333; }
        .user { background: #ff3366; }
        .admin { background: #990022; }
        .input-box {
            text-align: left;
            margin-bottom: 16px;
        }
        .input-box label {
            color: #aaa;
            display: block;
            margin-bottom: 6px;
        }
        .input-box input {
            width: 100%;
            padding: 11px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            outline: none;
            color: #fff;
        }
        .hide { display: none !important; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #222;
        }
        .logout {
            padding: 6px 14px;
            border: 1px solid #ff3366;
            background: transparent;
            border-radius: 6px;
            color: #ff3366;
            cursor: pointer;
        }
        /* 顶部标题 */
        .header {
            text-align: center;
            margin: 30px 0;
        }
        .header h1 {
            font-size: 42px;
            color: #ff3366;
        }
        .total-data {
            color: #999;
            margin-top: 10px;
        }
        /* 伴奏上传区 */
        .upload-wrap {
            border: 2px dashed #ff3366;
            border-radius: 14px;
            padding: 50px 20px;
            text-align: center;
            margin-bottom: 35px;
            cursor: pointer;
        }
        .upload-wrap p {
            font-size: 18px;
            color: #ccc;
        }
        input[type=file] { display: none; }
        /* 歌词滚动面板（K歌核心） */
        .lyric-k-box {
            background: linear-gradient(#15050b, #000);
            height: 320px;
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            overflow-y: auto;
            white-space: pre;
            font-size: 24px;
            line-height: 2.2;
            color: #777;
            margin-bottom: 30px;
        }
        /* 播放控制栏 */
        .player-bar {
            background: #161616;
            border-radius: 999px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 35px;
        }
        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #ff3366;
            font-size: 20px;
            cursor: pointer;
        }
        .record-btn {
            background: #fff;
            color: #ff3366;
        }
        .time-text {
            color: #aaa;
            width: 90px;
        }
        .progress {
            flex: 1;
            height: 5px;
        }
        /* 榜单/歌曲列表 */
        .song-rank h2 {
            font-size: 26px;
            border-left: 5px solid #ff3366;
            padding-left: 12px;
            margin-bottom: 20px;
        }
        .song-item {
            background: #141414;
            padding: 16px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: center;
        }
        .song-name { font-size: 17px; }
        .song-score { color: #ff3366; }
        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        /* 功能按钮区 */
        .func-box {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 40px 0;
        }
        .func-btn {
            padding: 13px 22px;
            border: 1px solid #444;
            background: transparent;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .func-btn:hover {
            border-color: #ff3366;
            color: #ff3366;
        }
        /* 管理员后台面板 */
        .admin-dash {
            background: #1a0810;
            border: 1px solid #ff3366;
            border-radius: 12px;
            padding: 25px;
            margin-top: 40px;
        }
        .admin-dash h3 {
            color: #ff3366;
            margin-bottom: 15px;
        }
        .admin-dash p {
            margin: 8px 0;
            font-size: 17px;
        }
    </style>
</head>
<body>
    <!-- 登录弹窗 -->
    <div class="login-modal" id="loginModal">
        <div class="login-card">
            <h2>波斯斯全民K歌</h2>
            <div class="login-group">
                <button class="login-btn guest" id="guestEnter">游客试听（仅听歌）</button>
                <button class="login-btn user" id="openUser">用户登录（可录歌上传）</button>
                <button class="login-btn admin" id="openAdmin">管理员后台</button>
            </div>
            <!-- 用户登录表单 -->
            <div class="hide" id="userForm">
                <div class="input-box">
                    <label>账号</label>
                    <input type="text" id="uName" placeholder="user">
                </div>
                <div class="input-box">
                    <label>密码</label>
                    <input type="password" id="uPwd" placeholder="123456">
                </div>
                <button class="login-btn user" id="subUser">登录K歌</button>
            </div>
            <!-- 管理员登录表单 -->
            <div class="hide" id="adminForm">
                <div class="input-box">
                    <label>管理员账号</label>
                    <input type="text" id="aName" placeholder="admin">
                </div>
                <div class="input-box">
                    <label>管理员密码</label>
                    <input type="password" id="aPwd" placeholder="admin888">
                </div>
                <button class="login-btn admin" id="subAdmin">进入数据后台</button>
            </div>
        </div>
    </div>

    <!-- 页面头部 -->
    <div class="status-bar">
        <span id="userTip">未登录</span>
        <button class="logout hide" id="logoutBtn">退出登录</button>
    </div>
    <div class="header">
        <h1>波斯斯全民K歌</h1>
        <div class="total-data" id="dataTip">全站演唱总次数：<span id="allPlay">0</span></div>
    </div>

    <!-- 伴奏&歌词上传 -->
    <label class="upload-wrap" id="uploadArea">
        <p>点击上传K歌伴奏 MP3 + LRC滚动歌词</p>
        <input type="file" id="audioUp" accept=".mp3">
        <input type="file" id="lrcUp" accept=".lrc">
    </label>

    <!-- 滚动歌词大屏（K歌核心） -->
    <div class="lyric-k-box" id="lyricView">上传歌词文件后，同步滚动歌词显示</div>

    <!-- 播放录制控制栏 -->
    <div class="player-bar">
        <button class="ctrl-btn" id="playBtn">▶</button>
        <button class="ctrl-btn record-btn" id="recordBtn">🎤</button>
        <span class="time-text" id="timeShow">00:00 / 00:00</span>
        <input type="range" class="progress" id="progressBar">
        <select id="speedSel">
            <option value="0.8">0.8x 慢速</option>
            <option value="1" selected>1.0x 标准</option>
            <option value="1.2">1.2x 快速</option>
        </select>
    </div>

    <!-- 歌曲榜单 -->
    <div class="song-rank">
        <h2>本地K歌榜单</h2>
        <div id="songListBox">
            <div class="empty-tip">暂无伴奏，上传歌曲开启K歌</div>
        </div>
    </div>

    <!-- 功能按钮 -->
    <div class="func-box" id="funcWrap">
        <button class="func-btn">智能修音</button>
        <button class="func-btn">保存录音作品</button>
        <button class="func-btn">分享K歌链接</button>
    </div>

    <!-- 管理员数据面板 -->
    <div class="admin-dash hide" id="adminPanel">
        <h3>管理员统计后台</h3>
        <p>总演唱次数：<span id="adminAllCount">0</span></p>
        <p>伴奏总数：<span id="adminSongNum">0</span></p>
        <p>录音作品数量：<span id="adminRecordNum">0</span></p>
    </div>

    <audio id="kAudio">

    <script>
        // 登录权限控制
        let userType = ""; // guest / user / admin
        const modal = document.getElementById("loginModal");
        const pageBody = document.body;
        const userTip = document.getElementById("userTip");
        const logoutBtn = document.getElementById("logoutBtn");
        const uploadArea = document.getElementById("uploadArea");
        const funcWrap = document.getElementById("funcWrap");
        const dataTip = document.getElementById("dataTip");
        const adminPanel = document.getElementById("adminPanel");

        // 登录弹窗元素
        const guestEnter = document.getElementById("guestEnter");
        const openUser = document.getElementById("openUser");
        const openAdmin = document.getElementById("openAdmin");
        const userForm = document.getElementById("userForm");
        const adminForm = document.getElementById("adminForm");
        const subUser = document.getElementById("subUser");
        const subAdmin = document.getElementById("subAdmin");

        // K歌音频元素
        const kAudio = document.getElementById("kAudio");
        const playBtn = document.getElementById("playBtn");
        const recordBtn = document.getElementById("recordBtn");
        const timeShow = document.getElementById("timeShow");
        const progressBar = document.getElementById("progressBar");
        const speedSel = document.getElementById("speedSel");
        const lyricView = document.getElementById("lyricView");
        const songListBox = document.getElementById("songListBox");
        const audioUp = document.getElementById("audioUp");
        const lrcUp = document.getElementById("lrcUp");
        const allPlayNum = document.getElementById("allPlay");

        // 全局数据
        let totalSing = 0;
        let songLibrary = [];
        let currentSong = null;
        let isPlaying = false;
        let isRecording = false;

        // 1. 游客登录（仅听歌，无上传/录歌/统计）
        guestEnter.onclick = () => {
            userType = "guest";
            modal.classList.add("hide");
            pageBody.style.display = "block";
            userTip.innerText = "当前：游客（仅试听）";
            logoutBtn.classList.remove("hide");
            uploadArea.style.display = "none";
            funcWrap.style.display = "none";
            dataTip.style.display = "none";
            adminPanel.classList.add("hide");
        }
        // 切换用户登录表单
        openUser.onclick = () => {
            userForm.classList.remove("hide");
            adminForm.classList.add("hide");
        }
        // 切换管理员表单
        openAdmin.onclick = () => {
            adminForm.classList.remove("hide");
            userForm.classList.add("hide");
        }
        // 用户账号验证 user / 123456
        subUser.onclick = () => {
            const n = document.getElementById("uName").value;
            const p = document.getElementById("uPwd").value;
            if(n === "user" && p === "123456"){
                userType = "user";
                modal.classList.add("hide");
                pageBody.style.display = "block";
                userTip.innerText = "当前：K歌用户（可录歌上传）";
                logoutBtn.classList.remove("hide");
                uploadArea.style.display = "block";
                funcWrap.style.display = "flex";
                dataTip.style.display = "block";
                adminPanel.classList.add("hide");
            } else alert("账号user，密码123456");
        }
        // 管理员账号 admin / admin888
        subAdmin.onclick = () => {
            const n = document.getElementById("aName").value;
            const p = document.getElementById("aPwd").value;
            if(n === "admin" && p === "admin888"){
                userType = "admin";
                modal.classList.add("hide");
                pageBody.style.display = "block";
                userTip.innerText = "当前：K歌管理员";
                logoutBtn.classList.remove("hide");
                uploadArea.style.display = "block";
                funcWrap.style.display = "flex";
                dataTip.style.display = "block";
                adminPanel.classList.remove("hide");
                refreshAdminData();
            } else alert("管理员账号admin，密码admin888");
        }
        // 退出登录
        logoutBtn.onclick = () => {
            userType = "";
            modal.classList.remove("hide");
            pageBody.style.display = "none";
            logoutBtn.classList.add("hide");
            userForm.classList.add("hide");
            adminForm.classList.add("hide");
        }

        // 上传伴奏
        audioUp.onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            kAudio.src = URL.createObjectURL(file);
            songLibrary.push({
                name: file.name,
                singCount: 0,
                lyric: ""
            })
            currentSong = songLibrary.length - 1;
            renderSongList();
            if(userType === "admin") refreshAdminData();
        }
        // 上传滚动歌词LRC
        lrcUp.onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.readAsText(file);
            reader.onload = res => {
                const text = res.target.result;
                lyricView.innerText = text;
                if(currentSong !== null) songLibrary[currentSong].lyric = text;
            }
        }
        // 渲染歌曲榜单
        function renderSongList() {
            if(songLibrary.length === 0){
                songListBox.innerHTML = `<div class="empty-tip">暂无伴奏，上传歌曲开启K歌</div>`;
                return;
            }
            let html = "";
            songLibrary.forEach((item,i)=>{
                html += `
                <div class="song-item">
                    <div class="song-name">${item.name}</div>
                    <div class="song-score">演唱次数：${item.singCount}</div>
                </div>`;
            })
            songListBox.innerHTML = html;
        }
        // 播放/暂停
        playBtn.onclick = () => {
            if(!kAudio.src) return;
            if(isPlaying){
                kAudio.pause();
                playBtn.innerText = "▶";
            } else {
                kAudio.play();
                playBtn.innerText = "⏸";
                totalSing++;
                allPlayNum.innerText = totalSing;
                if(currentSong !== null){
                    songLibrary[currentSong].singCount++;
                    renderSongList();
                }
                if(userType === "admin") refreshAdminData();
            }
            isPlaying = !isPlaying;
        }
        // 录音按钮切换状态
        recordBtn.onclick = () => {
            isRecording = !isRecording;
            recordBtn.style.background = isRecording ? "#ff3366" : "#fff";
            recordBtn.style.color = isRecording ? "#fff" : "#ff3366";
            alert(isRecording ? "开始录制K歌人声" : "停止录音");
        }
        // 倍速切换
        speedSel.onchange = () => kAudio.playbackRate = Number(speedSel.value);
        // 进度条时间同步
        kAudio.ontimeupdate = () => {
            const cur = formatTime(kAudio.currentTime);
            const dur = formatTime(kAudio.duration || 0);
            timeShow.innerText = `${cur} / ${dur}`;
            progressBar.value = (kAudio.currentTime / kAudio.duration) * 100 || 0;
        }
        progressBar.oninput = () => kAudio.currentTime = kAudio.duration * (progressBar.value / 100);
        // 时间格式化
        function formatTime(s) {
            let m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? "0"+sec : sec}`;
        }
        // 刷新管理员后台数据
        function refreshAdminData() {
            document.getElementById("adminAllCount").innerText = totalSing;
            document.getElementById("adminSongNum").innerText = songLibrary.length;
        }
    </script>
</body>
</html>
