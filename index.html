<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>步丝丝的歌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            width: 1709px;
            height: 960px;
            background: linear-gradient(180deg, #74b8ff 0%, #ffc8e0 100%);
            overflow: hidden;
            position: relative;
        }
        /* 花瓣装饰 */
        .petal {
            position: absolute;
            color: #ffb8d2;
            font-size: 120px;
            opacity: 0.7;
        }
        .p1 {top: 30px; right: 80px; rotate: 20deg;}
        .p2 {top: 480px; left: 180px; font-size: 80px;}
        .p3 {top: 420px; right: 90px; font-size: 60px;}
        /* 顶部logo */
        .logo {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 46px;
            color: white;
            font-weight: bold;
        }
        /* 顶部搜索栏 */
        .search-box {
            position: absolute;
            top: 40px;
            left: 35%;
            display: flex;
            align-items: center;
        }
        .search-input {
            width: 420px;
            height: 56px;
            border-radius: 99px;
            border: none;
            padding: 0 24px;
            font-size: 20px;
            background: rgba(255,255,255,0.85);
        }
        .login-top-btn {
            margin-left: 12px;
            height: 56px;
            width: 100px;
            border-radius: 99px;
            border: none;
            background: white;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
        }
        /* 模式按钮 */
        .mode-btn {
            width: 220px;
            height: 80px;
            border-radius: 99px;
            border: none;
            font-size: 32px;
            font-weight: 500;
            position: absolute;
            background: linear-gradient(90deg, #90d0ff, #f8b8e8);
            color: white;
        }
        .music-mode {
            top: 220px;
            left: 200px;
        }
        .video-mode {
            top: 220px;
            right: 200px;
        }
        /* 中间唱片封面 */
        .cover-box {
            width: 320px;
            height: 420px;
            background: #ffd8e4;
            border-radius: 24px;
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(255,120,180,0.3);
        }
        .disc {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7eb8, #ffc060);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .disc-center {
            width: 90px;
            height: 90px;
            background: #ffd8e8;
            border-radius: 50%;
        }
        .song-name {
            font-size: 64px;
            color: white;
            font-weight: bold;
            position: absolute;
        }
        .singer-name {
            margin-top: 20px;
            font-size: 36px;
            color: #222;
        }
        /* 歌词框 */
        .lyric-box {
            width: 820px;
            height: 110px;
            background: rgba(255,255,255,0.75);
            border-radius: 16px;
            position: absolute;
            top: 680px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: space-around;
            font-size: 36px;
            color: #222;
        }
        .split-line {
            width: 2px;
            height: 60px;
            background: #ccc;
        }
        /* 底部播放控制栏 */
        .bottom-bar {
            width: 100%;
            height: 140px;
            background: rgba(255,255,255,0.6);
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
        }
        .time-text {
            font-size: 30px;
            color: #333;
            width: 140px;
        }
        .prev-text {
            font-size: 28px;
            color: #333;
            width: 80px;
        }
        .progress {
            flex: 1;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            position: relative;
        }
        .progress-fill {
            width: 35%;
            height: 100%;
            background: #ff70b0;
            border-radius: 4px;
        }
        .progress-dot {
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            position: absolute;
            left: 35%;
            top: -9px;
            border: 2px solid #ff70b0;
        }
        .next-text {
            font-size: 28px;
            color: #333;
            width: 80px;
            text-align: right;
        }
        .base-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 36px;
            cursor: pointer;
        }
        .func-group {
            display: flex;
            gap: 24px;
            margin-left: 30px;
        }
        .func-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .func-icon {
            font-size: 32px;
            color: #333;
        }
        .func-text {
            font-size: 16px;
            color: #444;
        }
        /* 弹窗遮罩层 */
        .mask {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.35);
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .pop-box {
            width: 560px;
            background: rgba(255,255,255,0.88);
            border-radius: 24px;
            padding: 32px;
            position: relative;
            backdrop-filter: blur(8px);
        }
        .close-pop {
            position: absolute;
            top:20px;
            right:20px;
            font-size:28px;
            cursor:pointer;
            border:none;
            background:transparent;
        }
        .pop-title {
            text-align:center;
            font-size:48px;
            font-weight:bold;
            background:linear-gradient(90deg,#ff7cb8,#60c8ff);
            -webkit-background-clip:text;
            color:transparent;
            margin-bottom:20px;
        }
        .tab-wrap {
            display:flex;
            gap:12px;
            justify-content:center;
            margin-bottom:28px;
        }
        .tab-btn {
            width:130px;
            height:44px;
            border-radius:99px;
            border:none;
            font-size:20px;
            cursor:pointer;
        }
        .tab-reg {
            background:#ffb2cb;
            color:#fff;
        }
        .tab-login {
            background:#90c8ff;
            color:#fff;
        }
        /* 统一通栏输入框 */
        .input-item {
            width:100%;
            height:56px;
            border-radius:12px;
            border:none;
            padding:0 20px;
            font-size:20px;
            background:rgba(255,255,255,0.75);
            margin-bottom:18px;
        }
        .submit-btn {
            width:100%;
            height:64px;
            border-radius:99px;
            border:none;
            font-size:30px;
            color:#fff;
            background:linear-gradient(90deg,#ff88bb,#62d0ff);
            margin:12px 0 20px;
            cursor:pointer;
        }
        .tip-text {
            text-align:center;
            font-size:18px;
        }
        .tip-text a {
            color:#3088dd;
            cursor:pointer;
        }
        /* 注册表单默认隐藏 */
        .reg-form {
            display:none;
        }
    </style>
</head>
<body>
    <!-- 花瓣装饰 -->
    <div class="petal p1">❀</div>
    <div class="petal p2">❀</div>
    <div class="petal p3">❀</div>

    <!-- 顶部logo -->
    <div class="logo">步丝丝的歌</div>

    <!-- 顶部搜索登录 -->
    <div class="search-box">
        <input class="search-input" placeholder="搜索歌曲、歌手、专辑">
        <button class="login-top-btn" onclick="openPop()">登录</button>
    </div>

    <!-- 模式切换按钮 -->
    <button class="mode-btn music-mode">音乐模式</button>
    <button class="mode-btn video-mode">视频模式</button>

    <!-- 中间唱片封面 -->
    <div class="cover-box">
        <div class="disc">
            <div class="disc-center"></div>
            <div class="song-name">不负流年</div>
        </div>
        <div class="singer-name">步丝丝</div>
    </div>

    <!-- 歌词栏 -->
    <div class="lyric-box">
        <span>不怕夜更迭</span>
        <div class="split-line"></div>
        <span>在悲伤的时候</span>
    </div>

    <!-- 底部总控制栏 -->
    <div class="bottom-bar">
        <div class="time-text">01:28 / 03:46</div>
        <button class="base-btn">≫</button>
        <span class="prev-text">上首</span>
        <div class="progress">
            <div class="progress-fill"></div>
            <div class="progress-dot"></div>
        </div>
        <span class="next-text">下一首</span>
        <button class="base-btn">◀◀</button>
        <button class="base-btn">▶</button>
        <button class="base-btn">▶▶</div>
        <div class="func-group">
            <div class="func-btn">
                <div class="func-icon">🔁</div>
                <div class="func-text">循环</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">🔊</div>
                <div class="func-text">音量</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">📺</div>
                <div class="func-text">高清</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">🎛️</div>
                <div class="func-text">音效</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">🎤</div>
                <div class="func-text">伴奏</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">📝</div>
                <div class="func-text">歌词</div>
            </div>
            <div class="func-btn">
                <div class="func-icon">📃</div>
                <div class="func-text">播放列表</div>
            </div>
        </div>
    </div>

    <!-- 登录/注册弹窗 -->
    <div class="mask" id="popMask">
        <div class="pop-box">
            <button class="close-pop" onclick="closePop()">×</button>
            <div class="pop-title">注册/登录</div>
            <div class="tab-wrap">
                <button class="tab-btn tab-reg" onclick="switchTab('reg')">用户注册</button>
                <button class="tab-btn tab-login" onclick="switchTab('login')">账号登录</button>
            </div>
            <!-- 登录表单 -->
            <div class="login-form">
                <input class="input-item" placeholder="输入账号">
                <input class="input-item" placeholder="输入密码" type="password">
                <button class="submit-btn">立即登录</button>
                <div class="tip-text">还没有账号？<a onclick="switchTab('reg')">去注册</a></div>
            </div>
            <!-- 注册表单 -->
            <div class="reg-form">
                <input class="input-item" placeholder="设置账号">
                <input class="input-item" placeholder="设置密码" type="password">
                <input class="input-item" placeholder="确认密码" type="password">
                <button class="submit-btn">立即注册</button>
                <div class="tip-text">已有账号？<a onclick="switchTab('login')">去登录</a></div>
            </div>
        </div>
    </div>

    <script>
        // 管理员账号密码（仅写在代码内，界面不展示）
        const adminUser = "admin";
        const adminPwd = "bu4321";
        // 打开弹窗
        function openPop(){
            document.getElementById("popMask").style.display = "flex";
        }
        // 关闭弹窗
        function closePop(){
            document.getElementById("popMask").style.display = "none";
        }
        // 切换登录/注册标签
        function switchTab(type){
            const loginDom = document.querySelector(".login-form");
            const regDom = document.querySelector(".reg-form");
            if(type == "login"){
                loginDom.style.display = "block";
                regDom.style.display = "none";
            }else{
                loginDom.style.display = "none";
                regDom.style.display = "block";
            }
        }
    </script>
</body>
</html>
